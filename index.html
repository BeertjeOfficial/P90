<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P90 API</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --red:      #c0392b;
            --red-soft: rgba(192, 57, 43, 0.08);
            --bg:       #0c0c0c;
            --surface:  #141414;
            --border:   rgba(255,255,255,0.07);
            --text:     #a0a0a0;
            --white:    #efefef;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 24px;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 6px 16px;
            font-size: 12px;
            font-weight: 500;
            color: #666;
            margin-bottom: 48px;
            letter-spacing: 0.01em;
        }
        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #2ecc71;
            box-shadow: 0 0 0 2px rgba(46,204,113,0.2);
        }

        .hero {
            text-align: center;
            margin-bottom: 72px;
            max-width: 520px;
        }
        .hero h1 {
            font-size: clamp(2.4rem, 6vw, 4rem);
            font-weight: 600;
            color: var(--white);
            line-height: 1.1;
            letter-spacing: -0.03em;
        }
        .hero h1 em {
            font-style: normal;
            color: var(--red);
        }

        a.card {
            text-decoration: none;
            display: block;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 28px 24px;
            width: 280px;
            transition: border-color 0.2s, background 0.2s;
        }
        a.card:hover {
            border-color: rgba(192,57,43,0.4);
            background: #181818;
        }

        .card-label {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            font-weight: 500;
            color: var(--red);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 14px;
            opacity: 0.75;
        }
        .card-title {
            font-size: 13.5px;
            font-weight: 600;
            color: var(--white);
            margin-bottom: 6px;
            letter-spacing: -0.01em;
        }
        .card-desc {
            font-size: 12.5px;
            color: #484848;
            line-height: 1.6;
            font-weight: 400;
        }

        .status, .hero, a.card {
            animation: up 0.45s cubic-bezier(.22,.68,0,1.2) both;
        }
        .hero  { animation-delay: 0.08s; }
        a.card { animation-delay: 0.16s; }

        @keyframes up {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="status">
        <span class="status-dot"></span>
        All systems operational
    </div>

    <div class="hero">
        <h1>The <em>P90</em> API</h1>
    </div>

    <a href="offsets.html" class="card">
        <div class="card-label">HPP</div>
        <div class="card-title">offsets.hpp</div>
        <div class="card-desc">C++ header file format for legacy projects</div>
    </a>

</body>
</html>
